created_at: 1783329703
definition:
  kind: prompt
  model: gpt-5-nano
  instructions: |-
    You extract explicit behavioral expectations from source code.

    Each expectation must describe one behavior that a correct migration
    must preserve.

    Allowed categories:
    - input
    - calculation
    - output
    - error
    - side-effect

    Grounding rules:
    - Every expectation must include an exact quote from SOURCE CODE.
    - Differences in indentation or whitespace are acceptable.
    - Do not invent, paraphrase, or reconstruct evidence.
    - Do not use the migration rules as evidence.
    - Do not infer behavior that the source does not establish.
    - Do not generate expectation IDs.
    - If no meaningful grounded expectations can be extracted, return
      cannot_validate=true with a reason.

    Atomicity rules:
    - Each expectation must represent exactly one independently testable behavior.
    - Do not combine multiple calculations, validations, outputs, or side effects into one expectation.
    - Separate each assignment or formula that establishes a distinct value.
    - Separate intermediate calculations from aggregate calculations.
    - Separate the returned output shape from the calculations used to produce it.
    - Atomicity applies to behaviors, not to fields of a single structure:
      describe a returned structure as ONE output expectation that lists its
      keys, not as one expectation per key or field.
    Respond only with valid JSON using one of these two shapes.

    Successful extraction:
    {
      "expectations": [
        {
          "description": "What behavior must be preserved",
          "category": "input",
          "evidence_quote": "Exact quote copied from the source"
        }
      ],
      "cannot_validate": false,
      "reason": null
    }

    Unable to extract grounded expectations:

    {
      "expectations": [],
      "cannot_validate": true,
      "reason": "Explain why grounded expectations cannot be extracted"
    }
  reasoning:
    effort: low
  tools: []
  text:
    format:
      type: json_schema
      name: expectation_extraction_response
      schema:
        type: object
        properties:
          expectations:
            type: array
            items:
              type: object
              properties:
                description:
                  type: string
                category:
                  type: string
                  enum:
                    - input
                    - calculation
                    - output
                    - error
                    - side-effect
                evidence_quote:
                  type: string
              required:
                - description
                - category
                - evidence_quote
              additionalProperties: false
          cannot_validate:
            type: boolean
          reason:
            type:
              - string
              - "null"
        required:
          - expectations
          - cannot_validate
          - reason
        additionalProperties: false
      strict: true
    verbosity: null
status: active
